<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vehículos en desarme · STZ AutoPartes</title>
<meta name="description" content="Todas las unidades activas de STZ AutoPartes: fotografía real, motor, caja y repuestos trazables desde el ERP.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/img/favicon.png">
<link rel="apple-touch-icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="desarme">

<div id="site-header"></div>

<main>
  <!-- ================= CATÁLOGO EDITORIAL ================= -->
  <div id="desarme-list">
    <section class="dv-hero">
      <div class="dv-hero__lead">
        <div class="eyebrow">Vehículos en desarme</div>
        <h1 class="dv-hero__title">El origen<br>de cada pieza.</h1>
        <p class="dv-hero__sub">Explorá vehículos reales y consultá sus repuestos disponibles.</p>
      </div>
      <div class="dv-hero__count" aria-live="polite">
        <div class="dv-hero__bg" aria-hidden="true"></div>
        <div class="dv-hero__num" id="dv-count-total">00</div>
        <div class="dv-hero__label">Unidades<br>activas</div>
      </div>
    </section>

    <section class="dv-searchbar" aria-label="Buscar unidad en desarme">
      <form class="dv-searchbar__form" id="dv-filters" role="search" onsubmit="return false">
        <label class="dv-field dv-field--text">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input type="text" id="dv-q" name="q" placeholder="Marca, modelo o código" autocomplete="off">
        </label>
        <label class="dv-field">
          <span class="dv-field__k">Marca</span>
          <select id="dv-marca"><option value="">Todas</option></select>
        </label>
        <label class="dv-field">
          <span class="dv-field__k">Año</span>
          <select id="dv-anio"><option value="">Todos</option></select>
        </label>
        <label class="dv-field">
          <span class="dv-field__k">Motor</span>
          <select id="dv-motor"><option value="">Todos</option></select>
        </label>
        <label class="dv-field">
          <span class="dv-field__k">Caja</span>
          <select id="dv-caja"><option value="">Todas</option></select>
        </label>
        <button class="dv-searchbar__btn" type="submit">
          Buscar
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10h12M12 5l5 5-5 5"/></svg>
        </button>
      </form>
    </section>

    <section class="dv-toolbar">
      <div class="dv-tabs" id="dv-tabs" role="tablist"></div>
      <div class="dv-sort">
        <span class="dv-sort__k">Ordenar:</span>
        <select id="dv-sort" aria-label="Ordenar">
          <option value="recent">Recién ingresados</option>
          <option value="pieces">Más disponibles</option>
          <option value="year-desc">Año más reciente</option>
          <option value="year-asc">Año más antiguo</option>
        </select>
      </div>
    </section>

    <section class="dv-rows" id="dv-rows" aria-live="polite" aria-busy="true">
      <div class="dv-state dv-state--loading">Cargando unidades…</div>
    </section>

    <div class="dv-foot">
      <div class="dv-foot__count" id="dv-foot-count">Mostrando 0 de 0 unidades</div>
    </div>
  </div>

  <!-- ================= FICHA DE UNIDAD (ruta ?u=<code>) ================= -->
  <div id="desarme-detail" hidden>
    <div class="crumbs" id="udet-crumbs"></div>
    <div class="udet" id="udet"></div>
    <section class="udet-related" id="udet-related"></section>
  </div>
</main>

<div id="site-footer"></div>

<script>
  /* Router mínimo: sin ?u= mostrar catálogo, con ?u= mostrar detalle interactivo */
  (function(){
    var hasUnit = new URLSearchParams(location.search).has('u');
    document.getElementById('desarme-list').hidden   = hasUnit;
    document.getElementById('desarme-detail').hidden = !hasUnit;
  })();
</script>

<script src="assets/js/data.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
